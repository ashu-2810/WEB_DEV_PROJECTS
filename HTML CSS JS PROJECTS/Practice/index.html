<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>countDown tiimer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="main">
            <div class="text">We are comming soon</div>
            <div class="text">29 January 2024 12:30 PM</div>
            <div class="time">
                <div class="time-text">
                    <input type="text" readonly value="00">
                    <label for="">Days</label>
                </div>
                <div class="time-text">
                    <input type="text" readonly value="00">
                    <label for="">Hours</label>
                </div>
                <div class="time-text">
                    <input type="text" readonly value="00">
                    <label for="">Minutes</label>
                </div>
                <div class="time-text">
                    <input type="text" readonly value="00">
                    <label for="">Seconds</label>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
